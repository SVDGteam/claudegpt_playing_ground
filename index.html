<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Location Finder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#0d0f12; --surface:#151820; --surface2:#1c2030; --border:#2a3040; --accent:#4fffb0; --accent2:#4fc3ff; --text:#e8edf5; --muted:#6b7890; --warn:#ffb84f; --err:#ff6b6b; }
  body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:2rem; }
  header { display:flex; align-items:baseline; gap:1rem; margin-bottom:2rem; border-bottom:1px solid var(--border); padding-bottom:1rem; }
  h1 { font-family:'IBM Plex Mono',monospace; font-size:1.1rem; font-weight:500; color:var(--accent); letter-spacing:.05em; }
  .subtitle,.rate-note,.progress-label,.current-task,.stats-bar,.badge,.btn,.td-website,.loc-tag,.log-panel,thead th { font-family:'IBM Plex Mono',monospace; }
  .subtitle,.rate-note{font-size:.8rem;color:var(--muted)} .rate-note{font-size:.72rem}
  .controls{display:flex;gap:1rem;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap}
  .btn{font-size:.8rem;font-weight:500;padding:.5rem 1.2rem;border-radius:4px;cursor:pointer;border:1px solid;transition:all .15s;letter-spacing:.03em}
  .btn-primary{background:var(--accent);color:#0a0f0a;border-color:var(--accent)} .btn-primary:hover{background:#3de89a}
  .btn-secondary{background:transparent;color:var(--accent2);border-color:var(--accent2)} .btn-secondary:hover{background:rgba(79,195,255,.08)}
  .btn-ghost{background:transparent;color:var(--muted);border-color:var(--border)} .btn-ghost:hover{color:var(--text);border-color:var(--muted)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .stats-bar{display:flex;gap:2rem;margin-bottom:1.5rem;padding:.75rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:.75rem}
  .stat{display:flex;flex-direction:column;gap:2px}.stat-val{font-size:1.1rem;font-weight:500;color:var(--accent)}.stat-lbl{color:var(--muted)}
  .progress-wrap{margin-bottom:1.5rem;display:none}.progress-wrap.active{display:block}.progress-label{font-size:.75rem;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between}
  .progress-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}.progress-fill{height:100%;background:var(--accent);transition:width .3s ease;width:0%}
  .current-task{font-size:.7rem;color:var(--accent2);margin-top:6px;min-height:1.2em}
  .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:6px;max-height:70vh;overflow-y:auto}
  table{width:100%;border-collapse:collapse;font-size:.82rem} thead th{font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);text-align:left;padding:.5rem .75rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg)}
  tbody tr{border-bottom:1px solid var(--border)} tbody tr:hover{background:var(--surface)} td{padding:.6rem .75rem;vertical-align:top}
  .td-company{font-weight:500;white-space:nowrap}.td-website{font-size:.72rem;color:var(--muted)}.td-locations{font-size:.8rem;line-height:1.6}.td-status{white-space:nowrap}
  .loc-tag{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 7px;margin:2px 3px 2px 0;font-size:.72rem}
  .badge{font-size:.65rem;font-weight:500;padding:2px 8px;border-radius:3px;letter-spacing:.05em}
  .badge-pending{background:rgba(107,120,144,.15);color:var(--muted);border:1px solid var(--border)}
  .badge-running{background:rgba(79,195,255,.1);color:var(--accent2);border:1px solid rgba(79,195,255,.3)}
  .badge-done{background:rgba(79,255,176,.1);color:var(--accent);border:1px solid rgba(79,255,176,.3)}
  .badge-partial{background:rgba(255,184,79,.1);color:var(--warn);border:1px solid rgba(255,184,79,.3)}
  .badge-error{background:rgba(255,107,107,.1);color:var(--err);border:1px solid rgba(255,107,107,.3)}
  .export-area{margin-top:1.5rem;display:flex;gap:.75rem;align-items:center}
  .log-panel{margin-top:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.75rem 1rem;font-size:.7rem;color:var(--muted);max-height:140px;overflow-y:auto;display:none}
  .log-panel.active{display:block}.log-line{margin-bottom:3px}.log-line.ok{color:var(--accent)}.log-line.warn{color:var(--warn)}.log-line.err{color:var(--err)}.log-line.info{color:var(--accent2)}
</style>
</head>
<body>
<header><h1>// OFFICE LOCATION FINDER</h1><span class="subtitle">AI-powered · web search · careers scrape · 100 companies</span></header>
<div class="controls"><button class="btn btn-primary" id="btnRun">▶ Run All</button><button class="btn btn-secondary" id="btnResume" disabled>⟳ Resume Failed</button><button class="btn btn-ghost" id="btnReset">Reset</button><span class="rate-note" id="rateNote">Persisted progress + exponential backoff to survive rate limits</span></div>
<div class="stats-bar"><div class="stat"><span class="stat-val" id="statDone">0</span><span class="stat-lbl">done</span></div><div class="stat"><span class="stat-val" id="statPartial" style="color:var(--warn)">0</span><span class="stat-lbl">partial</span></div><div class="stat"><span class="stat-val" id="statError" style="color:var(--err)">0</span><span class="stat-lbl">failed</span></div><div class="stat"><span class="stat-val" id="statPending" style="color:var(--muted)">100</span><span class="stat-lbl">pending</span></div><div class="stat"><span class="stat-val" id="statLocs">0</span><span class="stat-lbl">locations found</span></div></div>
<div class="progress-wrap" id="progressWrap"><div class="progress-label"><span id="progText">Processing...</span><span id="progPct">0%</span></div><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><div class="current-task" id="currentTask"></div></div>
<div class="table-wrap"><table><thead><tr><th style="width:22%">Company</th><th style="width:18%">Website</th><th>Office Locations</th><th style="width:90px">Status</th></tr></thead><tbody id="tableBody"></tbody></table></div>
<div class="export-area"><button class="btn btn-secondary" id="btnCSV" disabled>↓ Export CSV</button><button class="btn btn-ghost" id="btnJSON" disabled>↓ Export JSON</button></div>
<div class="log-panel" id="logPanel"></div>
<script>
const STORAGE_KEY='office-location-finder-v2';
const BASE_DELAY_MS=2500, MAX_RETRIES=5;
const COMPANIES = [["Anduril","www.anduril.com"],["Saronic Technologies","www.saronic.com"],["Scale AI","www.scale.com"],["Shield AI","www.shield.ai"],["Databricks","www.databricks.com"],["Axiom Space","www.axiomspace.com"],["Sierra Space","www.sierraspace.com"],["Forterra","www.forterra.com"],["Castelion","www.castelion.com"],["PsiQuantum","www.psiquantum.com"],["OpenAI","www.openai.com"],["Onebrief","www.onebrief.com"],["Dataminr","www.dataminr.com"],["Hadrian","www.hadrian.co"],["CesiumAstro","www.cesiumastro.com"],["Skydio","www.skydio.com"],["Impulse Space","www.impulsespace.com"],["Stoke Space","www.stokespace.com"],["Govini","www.govini.com"],["Lambda","www.lambdalabs.com"],["Varda Space Industries","www.varda.com"],["JetZero","www.jetzero.aero"],["Applied Intuition","www.appliedintuition.com"],["APEX","www.apexspace.com"],["Blue Origin","www.blueorigin.com"],["Chainalysis","www.chainalysis.com"],["X-Bow","www.xbowsystems.com"],["Hermeus","www.hermeus.com"],["Epirus","www.epirusinc.com"],["Forcepoint","www.forcepoint.com"],["True Anomaly","www.trueanomaly.space"],["CHAOS","www.chaosinc.com"],["Relativity Space","www.relativityspace.com"],["Oura","www.ouraring.com"],["Zipline","www.zipline.com"],["Lyten","www.lyten.com"],["General Matter","www.generalmatter.com"],["Vulcan Elements","www.vulcanelements.com"],["Whoop","www.whoop.com"],["Defense Unicorns","www.defenseunicorns.com"],["K2 Space","www.k2space.com"],["Iceye","www.iceye.com"],["Ursa Major","www.ursamajor.com"],["Xona Space Systems","www.xonaspace.com"],["Tomorrow.io","www.tomorrow.io"],["Picogrid","www.picogrid.com"],["BetterUp","www.betterup.com"],["SimSpace","www.simspace.com"],["Divergent","www.divergent3d.com"],["Boom Supersonic","www.boomsupersonic.com"],["Turion Space","www.turionspace.com"],["Code Metal","www.codemetal.ai"],["Slingshot Aerospace","www.slingshot.space"],["Saildrone","www.saildrone.com"],["Shift5","www.shift5.io"],["Electra.aero","www.electra.aero"],["Re:Build Manufacturing","www.rebuildmanufacturing.com"],["Nominal","www.nominal.io"],["TRM Labs","www.trmlabs.com"],["Starfish Space","www.starfishspace.com"],["Grafana Labs","www.grafana.com"],["Umbra","www.umbra.space"],["Altana Technologies","www.altana.ai"],["Chainguard","www.chainguard.dev"],["Anaconda","www.anaconda.com"],["Radiant","www.radiantnuclear.com"],["Machina Labs","www.machinalabs.ai"],["Astranis","www.astranis.com"],["Vast Space","www.vastspace.com"],["Loft Orbital","www.loftorbital.com"],["Vannevar Labs","www.vannevarlabs.com"],["NODA AI","www.nodaintelligence.ai"],["Quindar","www.quindar.space"],["Firestorm","www.launchfirestorm.com"],["Compound Eye","www.compoundeye.com"],["Aalyria","www.aalyria.com"],["Hypori","www.hypori.com"],["Ayar Labs","www.ayarlabs.com"],["Atom Computing","www.atom-computing.com"],["Reliable Robotics","www.reliable.co"],["LeoLabs","www.leolabs.space"],["Virtualitics","www.virtualitics.com"],["Zeno Power","www.zenopower.com"],["Raft","www.teamraft.com"],["Overland AI","www.overland.ai"],["ThinkOrbital","www.thinkorbital.com"],["Cape","www.cape.co"],["Ditto","www.ditto.com"],["Antares","www.antaresindustries.com"],["Agility Robotics","www.agilityrobotics.com"],["Viken Detection","www.vikendetection.com"],["RED 6","www.red6ar.com"],["DataRobot","www.datarobot.com"],["Lunar Outpost","www.lunaroutpost.com"],["Flock Safety","www.flocksafety.com"],["DeepNight","www.deepnight.ai"],["Strider Technologies","www.striderintel.com"],["Integrate","www.integrate.co"],["Havoc AI","www.havocai.com"],["Noveon","www.noveon.co"]];
const SYSTEM_PROMPT=`You are a precise company research assistant...Return ONLY the JSON object, no preamble or explanation`;
let results={}, running=false, abortFlag=false;
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function saveState(){localStorage.setItem(STORAGE_KEY, JSON.stringify(results));}
function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');}catch{return {};}}
function init(){const persisted=loadState();const tbody=document.getElementById('tableBody');COMPANIES.forEach(([name,site],i)=>{results[i]=persisted[i]||{name,site,locations:[],status:'pending',notes:'',confidence:'',sources:[],retries:0};results[i].name=name;results[i].site=site;const tr=document.createElement('tr');tr.innerHTML=`<td class='td-company'>${name}</td><td class='td-website'>${site}</td><td class='td-locations' id='locs-${i}'></td><td class='td-status'><span class='badge' id='badge-${i}'></span></td>`;tbody.appendChild(tr);paintRow(i);});updateStats();}
function paintRow(i){const r=results[i],badge=document.getElementById(`badge-${i}`),locsCell=document.getElementById(`locs-${i}`);badge.className=`badge badge-${r.status}`;badge.textContent=r.status.toUpperCase();if(r.locations?.length){locsCell.innerHTML=r.locations.map(l=>`<span class='loc-tag'>${l}</span>`).join('')+((r.notes)?`<span style='color:var(--muted);font-size:.68rem;margin-left:4px'>${r.notes}</span>`:'');}else{locsCell.innerHTML=`<span style='color:var(--muted);font-size:.72rem;'>${r.notes||'—'}</span>`;}}
function addLog(msg,type='info'){const log=document.getElementById('logPanel');log.classList.add('active');const line=document.createElement('div');line.className=`log-line ${type}`;line.textContent=`[${new Date().toLocaleTimeString()}] ${msg}`;log.appendChild(line);log.scrollTop=log.scrollHeight;}
function updateStats(){let done=0,partial=0,err=0,pending=0,locs=0;Object.values(results).forEach(r=>{if(r.status==='done')done++;else if(r.status==='partial')partial++;else if(r.status==='error')err++;else pending++;locs+=(r.locations||[]).length;});
statDone.textContent=done;statPartial.textContent=partial;statError.textContent=err;statPending.textContent=pending;statLocs.textContent=locs;const processed=done+partial+err;const pct=Math.round((processed/COMPANIES.length)*100);progressFill.style.width=pct+'%';progPct.textContent=pct+'%';progText.textContent=`${processed} of ${COMPANIES.length} processed`;btnCSV.disabled=processed===0;btnJSON.disabled=processed===0;btnResume.disabled=err===0;saveState();}
async function processCompany(i){const r=results[i];r.status='running';paintRow(i);currentTask.textContent=`→ ${r.name}`;const prompt=`Company: ${r.name}\nWebsite: ${r.site}`;
for(let attempt=0;attempt<=MAX_RETRIES;attempt++){
try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:SYSTEM_PROMPT,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]})});
if(!res.ok){if([429,529].includes(res.status)){const wait=Math.min(120000, BASE_DELAY_MS*(2**attempt));addLog(`Rate limit on ${r.name}; retry ${attempt+1}/${MAX_RETRIES} in ${Math.round(wait/1000)}s`,'warn');await sleep(wait);continue;}throw new Error(`HTTP ${res.status}`);}const data=await res.json();const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');const clean=text.replace(/```json|```/g,'').trim();const parsed=JSON.parse((clean.match(/\{[\s\S]*\}/)||['{}'])[0]);r.locations=parsed.locations||[];r.sources=parsed.sources||[];r.notes=parsed.notes||'';r.confidence=parsed.confidence||'medium';r.status=r.locations.length? (r.confidence==='low'?'partial':'done') : 'partial';paintRow(i);updateStats();return true;}catch(e){if(attempt===MAX_RETRIES){r.status='error';r.notes=e.message;paintRow(i);updateStats();addLog(`✗ ${r.name}: ${e.message}`,'err');return false;}await sleep(BASE_DELAY_MS*(2**attempt));}}
}
async function runBatch(indices){running=true;abortFlag=false;btnRun.disabled=btnResume.disabled=btnReset.disabled=true;progressWrap.classList.add('active');for(const i of indices){if(abortFlag)break;await processCompany(i);await sleep(1200);}running=false;btnRun.disabled=false;btnReset.disabled=false;currentTask.textContent=abortFlag?'⚠ Stopped':'✓ Complete';updateStats();}
btnRun.onclick=()=>runBatch(COMPANIES.map((_,i)=>i).filter(i=>results[i].status==='pending'));
btnResume.onclick=()=>runBatch(COMPANIES.map((_,i)=>i).filter(i=>['error','pending'].includes(results[i].status)));
btnReset.onclick=()=>{if(running){abortFlag=true;return;}localStorage.removeItem(STORAGE_KEY);location.reload();};
btnCSV.onclick=()=>{const rows=[['Company','Website','Locations','Confidence','Sources','Notes','Status']];COMPANIES.forEach((_,i)=>{const r=results[i];rows.push([r.name,r.site,(r.locations||[]).join(' | '),r.confidence||'',(r.sources||[]).join(' | '),r.notes||'',r.status]);});const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='office_locations.csv';a.click();};
btnJSON.onclick=()=>{const out=COMPANIES.map((_,i)=>results[i]);const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(out,null,2)],{type:'application/json'}));a.download='office_locations.json';a.click();};
init();
</script>
</body></html>
